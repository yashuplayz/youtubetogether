services:
  # The Node.js Backend Server
  - type: web
    name: synctube-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npx tsx index.ts
    envVars:
      - key: NODE_ENV
        value: production

  # The React Frontend Client
  - type: web
    name: synctube-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        fromService:
          type: web
          name: synctube-server
          envVarKey: RENDER_EXTERNAL_URL
